<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="https://i.pinimg.com/736x/26/ce/86/26ce8634c0cac362ca9b33dea6e2b527.jpg">
    <title>Toko Faster's Scanning System</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root {
            --bg: #f1f5f9;
            --white: #ffffff;
            --text-main: #1e293b;
            --text-sub: #64748b;
            --primary: #2563eb; /* Biru Utama */
            --accent: #dbeade; /* Hijau Muda untuk Status */
            --border: #e2e8f0;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: var(--text-main);
        }

        .main-container {
            background-color: var(--white);
            padding: 2.5rem;
            border-radius: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 550px; /* Sedikit lebih lebar biar rapi */
            text-align: center;
            border: 1px solid var(--border);
            box-sizing: border-box;
        }

        /* Badge Status Sync */
        .status-badge {
            display: inline-block;
            padding: 6px 16px;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            background-color: var(--accent);
            color: #166534;
            letter-spacing: 0.05em;
        }

        .status-badge.offline {
            background-color: #fee2e2;
            color: #991b1b;
        }

        h1 {
            margin: 0 0 1.5rem 0;
            font-size: 1.8rem;
            font-weight: 800;
            color: #0f172a;
        }

        /* Input Scanner Modern */
        #scanInput {
            width: 100%;
            padding: 18px;
            border: 2px solid var(--border);
            border-radius: 15px;
            font-size: 1.3rem;
            text-align: center;
            outline: none;
            transition: all 0.2s ease-in-out;
            box-sizing: border-box;
            background-color: #f8fafc;
        }

        #scanInput:focus {
            border-color: var(--primary);
            background-color: var(--white);
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
        }

        /* Area Hasil Scan */
        .result-area {
            margin-top: 2.5rem;
            padding-top: 2rem;
            border-top: 2px solid #f1f5f9;
        }

        .product-name {
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 1.5rem;
            line-height: 1.3;
        }

        /* Grid Harga 2x2 yang Rapi */
        .price-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 2rem;
        }

        .price-box {
            background-color: #f8fafc;
            padding: 15px;
            border-radius: 12px;
            border: 1px solid var(--border);
            transition: transform 0.2s;
        }

        .price-box:hover {
            transform: translateY(-3px);
            border-color: var(--primary);
        }

        /* Sorotan Khusus Eceran 1 */
        .price-box.highlight {
            background-color: #eff6ff;
            border-color: #bfdbfe;
            grid-column: span 2; /* Full width untuk eceran utama */
            padding: 20px;
        }

        .price-label {
            font-size: 0.75rem;
            color: var(--text-sub);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .price-value {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--primary);
        }

        .price-box.highlight .price-value {
            font-size: 3rem; /* Paling besar */
        }

        /* Tag SKU di bawah */
        .sku-tag {
            display: inline-block;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.85rem;
            color: var(--text-sub);
            background-color: #f1f5f9;
            padding: 4px 10px;
            border-radius: 6px;
        }

        /* Pesan Idle */
        .idle-message {
            margin-top: 4rem;
            color: var(--text-sub);
            font-style: italic;
            font-size: 1.1rem;
        }
    </style>
</head>
<body style="background-image: url('https://i.pinimg.com/736x/a9/2e/63/a92e63f02128deabd96abd00225b4d9b.jpg'); background-size: cover; background-position: center; background-attachment: fixed;">

<div class="main-container">
    <div id="status" class="status-badge offline">Menghubungkan...</div>
    <h1>Scan your item...</h1>
    
    <input type="text" id="scanInput" placeholder="SCAN BARCODE..." autofocus>

<div class="result-area" id="resultDisplay" style="display: none;">
    <div class="product-name" id="pName">-</div>
    
    <div class="price-grid">
        <!-- BARIS ATAS (PRIORITAS) -->
        <div class="price-box highlight">
            <div class="price-label" id="label1">LABEL 1</div>
            <div class="price-value" id="val1">Rp 0</div>
        </div>
        <div class="price-box highlight">
            <div class="price-label" id="label2">LABEL 2</div>
            <div class="price-value" id="val2">Rp 0</div>
        </div>
        
        <!-- BARIS BAWAH (SEKUNDER) -->
        <div class="price-box">
            <div class="price-label" id="label3">LABEL 3</div>
            <div class="price-value" id="val3">Rp 0</div>
        </div>
        <div class="price-box">
            <div class="price-label" id="label4">LABEL 4</div>
            <div class="price-value" id="val4">Rp 0</div>
        </div>
    </div>

    <div class="sku-tag" id="pCode">KODE: -</div>
</div>

    <div id="idleMsg" class="idle-message">
        Siap menerima *scan* barang...
    </div>
</div>

<script>
    // URL CSV Google Sheets kamu (pastikan sudah dipublish)
    const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQqFjmQEMLJl-UhiBkV6hDmVePKMGhWgUkwqPWiUOcv6YeBjX9-mw75au_WztJIkcbwr0D2hcDAGZrw/pub?gid=1746227063&single=true&output=csv";
    
    let inventoryData = [];

    // Fungsi muat data
    function initApp() {
        Papa.parse(CSV_URL, {
            download: true,
            header: true,
            skipEmptyLines: true,
            complete: function(results) {
                inventoryData = results.data;
                console.log("Data contoh baris 1:", inventoryData[0]); // Untuk cek nama kolom di console

                // Update status badge
                const statusBadge = document.getElementById('status');
                statusBadge.innerText = "✅ ONLINE: " + inventoryData.length + " ITEM";
                statusBadge.classList.remove('offline');
            },
            error: function() {
                document.getElementById('status').innerText = "❌ GAGAL SYNC DATA";
            }
        });
    }

    const inputField = document.getElementById('scanInput');
    const displayArea = document.getElementById('resultDisplay');
    const idleMsg = document.getElementById('idleMsg');

    // Listener untuk input alat scan
    inputField.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
            const barcodeVal = inputField.value.trim();
            if (barcodeVal) {
                searchProduct(barcodeVal);
            }
            inputField.value = ''; // Reset input
        }
    });

function searchProduct(barcode) {
    const product = inventoryData.find(item => 
        String(item['kode jamak']).trim() === barcode || 
        String(item['kode tunggal']).trim() === barcode
    );

    if (product) {
        idleMsg.style.display = 'none';
        displayArea.style.display = 'block';
        document.getElementById('pName').innerText = product['nama produk'];
        document.getElementById('pCode').innerText = "SCAN: " + barcode;

        const isJamak = String(product['kode jamak']).trim() === barcode;

        if (isJamak) {
            // JIKA JAMAK: Grosir di Atas, Eceran di Bawah
            fillPrice("GROSIR 1", product['grosir 1'], 
                      "GROSIR 2", product['grosir 2'], 
                      "ECERAN 1", product['eceran 1'], 
                      "ECERAN 2", product['eceran 2']);
            setHighlightColor("#166534"); // Hijau untuk grosir
        } else {
            // JIKA TUNGGAL: Eceran di Atas, Grosir di Bawah
            fillPrice("ECERAN 1", product['eceran 1'], 
                      "ECERAN 2", product['eceran 2'], 
                      "GROSIR 1", product['grosir 1'], 
                      "GROSIR 2", product['grosir 2']);
            setHighlightColor("#2563eb"); // Biru untuk eceran
        }
    } else {
        alert("Kode tidak ditemukan!");
    }
}

function fillPrice(l1, v1, l2, v2, l3, v3, l4, v4) {
    document.getElementById('label1').innerText = l1;
    document.getElementById('val1').innerText = formatRupiah(v1);
    document.getElementById('label2').innerText = l2;
    document.getElementById('val2').innerText = formatRupiah(v2);
    document.getElementById('label3').innerText = l3;
    document.getElementById('val3').innerText = formatRupiah(v3);
    document.getElementById('label4').innerText = l4;
    document.getElementById('val4').innerText = formatRupiah(v4);
}

function setHighlightColor(color) {
    const boxes = document.querySelectorAll('.price-box.highlight');
    boxes.forEach(box => box.style.borderColor = color);
}

// Helper function to fill the labels and values
function updatePriceDisplay(mLab, mVal, sLab1, sVal1, sLab2, sVal2, sLab3, sVal3) {
    document.getElementById('mainLabel').innerText = mLab;
    document.getElementById('mainValue').innerText = formatRupiah(mVal);
    
    document.getElementById('subLabel1').innerText = sLab1;
    document.getElementById('subValue1').innerText = formatRupiah(sVal1);
    
    document.getElementById('subLabel2').innerText = sLab2;
    document.getElementById('subValue2').innerText = formatRupiah(sVal2);
    
    document.getElementById('subLabel3').innerText = sLab3;
    document.getElementById('subValue3').innerText = formatRupiah(sVal3);
}
    // Fungsi pembantu untuk format angka jadi Rupiah sederhana
    function formatRupiah(angka) {
        if (!angka) return "Rp 0";
        // Bersihkan karakter non-angka dulu
        const cleanAngka = angka.replace(/[^0-9]/g, '');
        if (!cleanAngka) return "Rp 0";
        
        // Tambahkan titik ribuan
        return "Rp " + cleanAngka.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ".");
    }

    // Pastikan input selalu fokus walau layar diklik
    document.addEventListener('click', () => inputField.focus());
    
    // Jalankan aplikasi
    initApp();
</script>

</body>
</html>
